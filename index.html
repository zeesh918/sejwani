<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML to Image Snapshot Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            margin: 0;
            padding: 20px;
            display: flex;
            gap: 20px;
            height: 100vh;
            box-sizing: border-box;
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            margin-top: 0;
            font-size: 1.25rem;
        }
        textarea {
            flex: 1;
            width: 100%;
            padding: 10px;
            font-family: monospace;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        /* The container where the HTML is temporarily rendered */
        #render-container {
            width: 100%;
            min-height: 200px;
            border: 1px dashed #d1d5db;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }
        /* The final image output area */
        #result-container {
            margin-top: 20px;
            text-align: center;
        }
        #result-image {
            max-width: 100%;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            display: none;
        }
        .download-btn {
            display: none;
            background-color: #10b981;
            margin-top: 15px;
            text-decoration: none;
            text-align: center;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .download-btn:hover {
            background-color: #059669;
        }
    </style>
</head>
<body>

    <div class="panel">
        <h2>1. Paste HTML/CSS Code</h2>
        <textarea id="code-input" placeholder="<h1>Hello World</h1><style>h1 { color: red; }</style>"></textarea>
        
        <div class="controls">
            <label for="bg-color"><strong>Background:</strong></label>
            <input type="color" id="bg-color" value="#ffffff">
            
            <button onclick="generateSnapshot()">Generate High-Q Snapshot</button>
        </div>
    </div>

    <div class="panel" style="overflow-y: auto;">
        <h2>2. Snapshot Result</h2>
        
        <div style="position: absolute; left: -9999px;">
            <div id="render-container"></div>
        </div>

        <div id="result-container">
            <img id="result-image" alt="Generated Snapshot">
            <a id="download-link" class="download-btn button" download="website-snapshot.png">
                <button class="download-btn" style="display: block;">Download Image</button>
            </a>
        </div>
    </div>

    <script>
        async function generateSnapshot() {
            const rawCode = document.getElementById('code-input').value;
            const bgColor = document.getElementById('bg-color').value;
            const renderContainer = document.getElementById('render-container');
            const resultImage = document.getElementById('result-image');
            const downloadLink = document.getElementById('download-link');

            if (!rawCode.trim()) {
                alert("Please enter some HTML code first.");
                return;
            }

            // 1. Inject the user's HTML into the render container
            renderContainer.innerHTML = rawCode;
            
            // 2. Apply the chosen background color to the container
            renderContainer.style.backgroundColor = bgColor;

            try {
                // 3. Capture the container using html2canvas
                const canvas = await html2canvas(renderContainer, {
                    scale: 3, // High-quality multiplier (3x resolution)
                    backgroundColor: bgColor,
                    useCORS: true, // Attempt to load cross-origin images if present
                    logging: false
                });

                // 4. Convert canvas to an image URL (PNG)
                const imgData = canvas.toDataURL('image/png');

                // 5. Display the image and setup the download link
                resultImage.src = imgData;
                resultImage.style.display = 'block';
                
                downloadLink.href = imgData;
                downloadLink.style.display = 'block';

            } catch (error) {
                console.error("Error generating snapshot:", error);
                alert("Failed to generate snapshot. Check console for details.");
            }
        }
    </script>
</body>
</html>
