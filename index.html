<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapForge — Code to Design Snapshot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --accent: #7c6dfa;
    --accent2: #fa6d9a;
    --accent3: #6dfae0;
    --text: #f0eeff;
    --muted: #6b6880;
    --success: #6dfaa0;
    --radius: 14px;
    --radius-sm: 8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 80vw;
    height: 80vw;
    background: radial-gradient(ellipse, rgba(124,109,250,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -40%;
    right: -20%;
    width: 70vw;
    height: 70vw;
    background: radial-gradient(ellipse, rgba(250,109,154,0.09) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* ── HEADER ── */
  header {
    padding: 28px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 1280px;
    margin: 0 auto;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.35rem;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 9px;
    display: grid;
    place-items: center;
    font-size: 1rem;
  }
  .logo span { color: var(--accent); }

  .badge {
    font-size: 0.68rem;
    font-family: 'DM Mono', monospace;
    background: rgba(124,109,250,0.15);
    border: 1px solid rgba(124,109,250,0.3);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 100px;
    letter-spacing: 0.04em;
  }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 52px 20px 40px;
  }
  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.4rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 14px;
  }
  .hero h1 em {
    font-style: normal;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero p {
    color: var(--muted);
    font-size: 1.05rem;
    font-weight: 300;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* ── MAIN GRID ── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    padding: 0 20px 20px;
    max-width: 1280px;
    margin: 0 auto;
  }

  @media (max-width: 860px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  /* ── PANELS ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    flex-shrink: 0;
  }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  .tab-bar {
    display: flex;
    gap: 4px;
  }
  .tab-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 5px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .tab-btn.active {
    background: rgba(124,109,250,0.15);
    border-color: rgba(124,109,250,0.4);
    color: var(--accent);
  }
  .tab-btn:hover:not(.active) {
    background: rgba(255,255,255,0.05);
    color: var(--text);
  }

  /* Code editors */
  .code-pane { display: none; flex-direction: column; flex: 1; }
  .code-pane.active { display: flex; }

  .code-editor {
    width: 100%;
    flex: 1;
    min-height: 260px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.7;
    padding: 18px 20px;
    resize: none;
    tab-size: 2;
    caret-color: var(--accent);
  }

  /* ── PREVIEW PANEL ── */
  .preview-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    grid-column: 1 / -1;
  }

  @media (max-width: 860px) {
    .preview-panel { grid-column: 1; }
  }

  .preview-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    flex-wrap: wrap;
  }

  .browser-dots {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .browser-dots span {
    width: 11px; height: 11px;
    border-radius: 50%;
  }
  .browser-dots span:nth-child(1) { background: #ff5f57; }
  .browser-dots span:nth-child(2) { background: #febc2e; }
  .browser-dots span:nth-child(3) { background: #28c840; }

  .viewport-btns {
    display: flex;
    gap: 4px;
    margin-left: auto;
    flex-wrap: wrap;
  }
  .vp-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 0.78rem;
    font-family: 'DM Mono', monospace;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .vp-btn.active, .vp-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,109,250,0.1);
  }

  /* Background picker */
  .bg-section {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.015);
    flex-wrap: wrap;
  }

  .bg-label {
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    flex-shrink: 0;
    margin-right: 4px;
  }

  .bg-swatches {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
  }

  .swatch {
    width: 26px; height: 26px;
    border-radius: 6px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .swatch.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(124,109,250,0.4);
  }
  .swatch:hover { transform: scale(1.15); }

  .swatch[data-bg="white"] { background: #ffffff; }
  .swatch[data-bg="light-gray"] { background: #f0f0f0; }
  .swatch[data-bg="dark"] { background: #1a1a2e; }
  .swatch[data-bg="black"] { background: #000000; }
  .swatch[data-bg="gradient-warm"] { background: linear-gradient(135deg, #ffecd2, #fcb69f); }
  .swatch[data-bg="gradient-cool"] { background: linear-gradient(135deg, #a8edea, #fed6e3); }
  .swatch[data-bg="gradient-purple"] { background: linear-gradient(135deg, #667eea, #764ba2); }
  .swatch[data-bg="gradient-ocean"] { background: linear-gradient(135deg, #2193b0, #6dd5ed); }
  .swatch[data-bg="gradient-forest"] { background: linear-gradient(135deg, #134e5e, #71b280); }
  .swatch[data-bg="noise"] {
    background: #e8e8e8;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
  }

  .custom-color-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: 4px;
  }
  .custom-color-wrap label {
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  #customBgColor {
    width: 26px; height: 26px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    padding: 0;
    background: none;
  }

  /* Preview frame area */
  .preview-frame-wrap {
    padding: 24px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    background: repeating-conic-gradient(rgba(255,255,255,0.03) 0% 25%, transparent 0% 50%) 0 0 / 20px 20px;
    min-height: 380px;
    overflow: auto;
  }

  .preview-device {
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    width: 100%;
    max-width: 100%;
    border-radius: 10px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08),
      0 30px 80px rgba(0,0,0,0.6),
      0 8px 20px rgba(0,0,0,0.4);
  }
  .preview-device.tablet { max-width: 768px; }
  .preview-device.mobile { max-width: 390px; }

  #previewFrame {
    width: 100%;
    border: none;
    display: block;
    min-height: 420px;
    background: white;
  }

  /* ── ACTIONS ── */
  .actions-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    padding: 9px 20px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #5a4fd8);
    color: #fff;
    box-shadow: 0 4px 20px rgba(124,109,250,0.35);
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(124,109,250,0.5);
  }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-secondary:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.2);
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

  .btn-success {
    background: linear-gradient(135deg, #27ae72, #1a7a50);
    color: #fff;
    box-shadow: 0 4px 16px rgba(39,174,114,0.3);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }

  .spacer { flex: 1; }

  /* Status */
  .status-chip {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 4px 12px;
    border-radius: 100px;
    letter-spacing: 0.04em;
    background: rgba(109,250,160,0.1);
    border: 1px solid rgba(109,250,160,0.2);
    color: var(--success);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .status-chip.visible { opacity: 1; }

  /* Scale selector */
  .scale-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    outline: none;
  }
  .scale-select option { background: #1a1a26; }

  /* ── BOTTOM CONTROLS ── */
  .bottom-controls {
    padding: 0 20px 32px;
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .tips {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
  }

  .tip-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .tip-icon {
    width: 30px; height: 30px;
    border-radius: 7px;
    display: grid;
    place-items: center;
    font-size: 0.9rem;
    flex-shrink: 0;
  }
  .tip-icon.purple { background: rgba(124,109,250,0.15); }
  .tip-icon.pink   { background: rgba(250,109,154,0.15); }
  .tip-icon.teal   { background: rgba(109,250,224,0.15); }
  .tip-text h4 {
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    margin-bottom: 3px;
  }
  .tip-text p { font-size: 0.75rem; color: var(--muted); line-height: 1.5; }

  /* Snapshot modal */
  #snapshotModal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(12px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #snapshotModal.open { display: flex; }

  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    width: 100%;
    max-width: 720px;
    max-height: 90vh;
    overflow: auto;
    box-shadow: 0 40px 120px rgba(0,0,0,0.7);
    animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.9) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }
  .modal-header h3 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    display: flex; align-items: center; gap: 10px;
  }
  .modal-close {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    display: grid;
    place-items: center;
    transition: all 0.2s;
  }
  .modal-close:hover { background: rgba(255,255,255,0.12); }

  .modal-body { padding: 24px; }

  #snapshotImg {
    width: 100%;
    border-radius: 10px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    display: block;
    margin-bottom: 18px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 22px;
    border-radius: 100px;
    font-size: 0.82rem;
    font-family: 'DM Mono', monospace;
    z-index: 2000;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* Spinner */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Loading overlay */
  #loadingOverlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(10,10,15,0.7);
    backdrop-filter: blur(4px);
    z-index: 10;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    border-radius: var(--radius);
  }
  #loadingOverlay.active { display: flex; }
  .loading-ring {
    width: 44px; height: 44px;
    border: 3px solid rgba(124,109,250,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

  /* Mobile tweaks */
  @media (max-width: 580px) {
    .hero { padding: 36px 20px 28px; }
    .preview-frame-wrap { padding: 14px; min-height: 280px; }
    .actions-bar { gap: 8px; }
    .btn { padding: 8px 14px; font-size: 0.8rem; }
    .bg-section { gap: 6px; }
    .swatch { width: 22px; height: 22px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    Snap<span>Forge</span>
  </div>
  <div class="badge">v1.0 · LIVE</div>
</header>

<div class="hero">
  <h1>Code → <em>Design Snapshot</em></h1>
  <p>Paste HTML, CSS, and JavaScript separately — or drop a complete HTML file. Preview instantly. Capture as a high-quality image.</p>
</div>

<div class="main-grid">

  <!-- HTML Panel -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title"><div class="dot"></div> Source Code</div>
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('html')">HTML</button>
        <button class="tab-btn" onclick="switchTab('css')">CSS</button>
        <button class="tab-btn" onclick="switchTab('js')">JS</button>
        <button class="tab-btn" onclick="switchTab('full')" id="tabFull" style="color:var(--accent3);border-color:rgba(109,250,224,0.25);">Full ⚡</button>
      </div>
    </div>
    <div class="code-pane active" id="pane-html">
      <textarea class="code-editor" id="htmlEditor" spellcheck="false" placeholder="<!-- Paste your HTML here -->
<div class=&quot;card&quot;>
  <h1>Hello, World!</h1>
  <p>Your design goes here...</p>
</div>"></textarea>
    </div>
    <div class="code-pane" id="pane-css">
      <textarea class="code-editor" id="cssEditor" spellcheck="false" placeholder="/* Your styles here */
.card {
  font-family: sans-serif;
  padding: 40px;
  text-align: center;
}"></textarea>
    </div>
    <div class="code-pane" id="pane-js">
      <textarea class="code-editor" id="jsEditor" spellcheck="false" placeholder="// Your JavaScript here
console.log('Ready!');"></textarea>
    </div>
    <div class="code-pane" id="pane-full">
      <div style="padding:8px 16px 0;display:flex;align-items:center;gap:8px;flex-shrink:0;">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--accent3);box-shadow:0 0 8px var(--accent3);flex-shrink:0;"></div>
        <span style="font-size:0.72rem;font-family:'DM Mono',monospace;color:var(--accent3);letter-spacing:0.05em;">FULL HTML MODE — paste a complete &lt;!DOCTYPE html&gt; file</span>
      </div>
      <textarea class="code-editor" id="fullEditor" spellcheck="false" placeholder="<!DOCTYPE html>
<html>
<head>
  <style>/* your CSS */</style>
</head>
<body>
  <!-- your HTML -->
  <script>/* your JS */<\/script>
